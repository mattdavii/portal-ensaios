<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resistência de Malha - Portal de Engenharia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { background: #f4f7f6; font-size: 0.85rem; padding: 10px; }
        .group-box { background: white; border-radius: 12px; padding: 18px; margin-bottom: 12px; border: 1px solid #dee2e6; }
        .label-eng { font-weight: bold; color: #0d6efd; font-size: 0.75rem; display: block; margin-bottom: 8px; text-transform: uppercase; }
        .norma { background: #e3f2fd; color: #055160; padding: 5px; border-radius: 4px; font-size: 0.7rem; font-style: italic; margin-bottom: 10px; border-left: 3px solid #0d6efd; display: block; }
        .status-badge { padding: 4px 10px; border-radius: 4px; font-weight: bold; font-size: 0.7rem; }
        .bg-ok { background: #d1e7dd; color: #0f5132; }
        .bg-fail { background: #f8d7da; color: #842029; }
        .bg-warn { background: #e2e3e5; color: #41464b; }
        .calculo-dist { background: #e9ecef; padding: 8px; border-radius: 6px; font-size: 0.75rem; text-align: center; font-weight: bold; color: #495057; border: 1px dashed #ced4da;}
        .table-laudo { width: 100%; margin-top: 5px; border-collapse: collapse; }
        .table-laudo th, .table-laudo td { border: 1px solid #eee; padding: 6px; text-align: center; }
        .header-laudo { background: #f8f9fa; font-weight: bold; color: #333; padding: 10px; border-radius: 5px; margin-bottom: 10px; border: 1px solid #ddd; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>
    <div class="container" style="max-width: 550px;">
        <a href="/" class="btn btn-sm btn-outline-secondary mb-3 no-print">⬅️ Voltar ao Menu</a>
        <h5 class="text-center text-secondary mb-3">🌍 Resistência de Malha</h5>
        
        <form id="formEnsaios">
            <div class="group-box shadow-sm">
                <span class="label-eng">Identificação</span>
                <input type="hidden" id="metodo" value="Queda de Potencial (62%)">
                <div class="row g-2 mb-2">
                    <div class="col"><input type="text" id="usina" class="form-control" placeholder="Usina" required></div>
                    <div class="col"><input type="text" id="tag" class="form-control" placeholder="TAG (Ex: Malha Principal)" required></div>
                </div>
            </div>

            <div class="group-box shadow-sm">
                <span class="label-eng">Dados do Ensaio (Regra dos 62%)</span>
                <span class="norma">Critério: Patamar com desvio <= 10% e R. Média <= 10 Ω</span>
                
                <div class="row g-2 mb-3 align-items-center">
                    <div class="col-8 text-muted small fw-bold">Distância da Haste de Corrente (D):</div>
                    <div class="col-4">
                        <input type="text" inputmode="decimal" id="d_total" class="form-control border-primary text-center" placeholder="Metros" oninput="calcularDistancias()">
                    </div>
                </div>

                <div id="box_distancias" class="calculo-dist mb-3 d-none">
                    Posicionar Haste de Tensão em: <br>
                    <span id="d52" class="text-primary"></span>m (52%) | 
                    <span id="d62" class="text-primary"></span>m (62%) | 
                    <span id="d72" class="text-primary"></span>m (72%)
                </div>
                
                <div class="row g-2">
                    <div class="col"><label class="small text-muted">R 52% (Ω)</label><input type="text" inputmode="decimal" id="r52" class="form-control"></div>
                    <div class="col"><label class="small text-muted">R 62% (Ω)</label><input type="text" inputmode="decimal" id="r62" class="form-control"></div>
                    <div class="col"><label class="small text-muted">R 72% (Ω)</label><input type="text" inputmode="decimal" id="r72" class="form-control"></div>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-3 fw-bold shadow no-print">GERAR LAUDO DE ATERRAMENTO</button>
        </form>

        <div id="box_laudo" class="mt-4 p-4 bg-white border rounded d-none shadow">
            <h6 class="text-center fw-bold border-bottom pb-2 mb-3">LAUDO - RESISTÊNCIA DE MALHA</h6>
            <div id="laudo_header" class="header-laudo"></div>
            <div id="laudo_body"></div>
            <button onclick="gerarPDF()" class="btn btn-danger w-100 mt-4 fw-bold no-print">📥 DESCARREGAR PDF</button>
        </div>
    </div>

    <script>
        const parseF = (id) => { let v = document.getElementById(id).value.replace(',', '.'); return v === "" ? 0 : parseFloat(v); };
        function badgeClass(status) { return status === 'CONFORME' ? 'bg-ok' : (status.includes('NÃO AVALIADO') ? 'bg-warn' : 'bg-fail'); }

        // MÁGICA: Calcula as posições da haste de tensão em tempo real
        function calcularDistancias() {
            let d = parseF('d_total');
            let box = document.getElementById('box_distancias');
            if (d > 0) {
                document.getElementById('d52').innerText = (d * 0.52).toFixed(1).replace('.', ',');
                document.getElementById('d62').innerText = (d * 0.62).toFixed(1).replace('.', ',');
                document.getElementById('d72').innerText = (d * 0.72).toFixed(1).replace('.', ',');
                box.classList.remove('d-none');
            } else {
                box.classList.add('d-none');
            }
        }

        document.getElementById('formEnsaios').onsubmit = async (e) => {
            e.preventDefault();
            const payload = {
                usina: document.getElementById('usina').value, tag: document.getElementById('tag').value,
                metodo: document.getElementById('metodo').value, d_total: parseF('d_total'),
                r52: parseF('r52'), r62: parseF('r62'), r72: parseF('r72')
            };

            try {
                const response = await fetch('/ensaio/res-malha/validar', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                const d = await response.json();
                
                const box = document.getElementById('box_laudo');
                box.classList.remove('d-none');
                
                document.getElementById('laudo_header').innerHTML = `<div class="row text-center"><div class="col-6"><b>TAG:</b> ${payload.tag}</div><div class="col-6"><b>Usina:</b> ${payload.usina}</div><div class="col-12 mt-2 text-muted small"><b>Método:</b> ${payload.metodo} com D = ${payload.d_total}m</div></div>`;

                const formataBR = (num) => num.toString().replace('.', ',');

                document.getElementById('laudo_body').innerHTML = `
                    <div class="mb-3">
                        <span class="label-eng">Curva do Patamar (Queda de Potencial)</span>
                        <table class="table-laudo">
                            <tr><th>52%</th><th>62%</th><th>72%</th></tr>
                            <tr><td>${formataBR(payload.r52)} Ω</td><td>${formataBR(payload.r62)} Ω</td><td>${formataBR(payload.r72)} Ω</td></tr>
                        </table>
                    </div>
                    
                    <div class="mb-3 p-3 bg-light border rounded text-center">
                        <div class="row">
                            <div class="col-6 border-end">
                                <span class="d-block small text-muted text-uppercase fw-bold">Desvio da Curva</span>
                                <span class="fs-5 fw-bold ${d.desvio <= 10 ? 'text-success' : 'text-danger'}">${formataBR(d.desvio)}%</span>
                                <span class="d-block mt-1 status-badge ${badgeClass(d.status_plat)}">${d.status_plat}</span>
                            </div>
                            <div class="col-6">
                                <span class="d-block small text-muted text-uppercase fw-bold">Resistência Média</span>
                                <span class="fs-5 fw-bold text-primary">${formataBR(d.r_media)} Ω</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="text-end mt-2 border-top pt-2">
                        Veredito Final: <span class="status-badge ${badgeClass(d.status_geral)}">${d.status_geral}</span>
                    </div>
                `;
                box.scrollIntoView({ behavior: 'smooth' });
            } catch (error) { alert("Erro ao validar. Verifique o servidor."); }
        };

        function gerarPDF() {
            const elemento = document.getElementById('box_laudo');
            document.querySelector('.no-print.btn-danger').style.display = 'none';
            html2pdf().set({ margin: 15, filename: `Laudo_Aterramento_${document.getElementById('tag').value}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2, scrollY: 0, useCORS: true }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } }).from(elemento).save().then(() => { document.querySelector('.no-print.btn-danger').style.display = 'block'; });
        }
    </script>
</body>
</html>
