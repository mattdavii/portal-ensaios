<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Cabos CC - Múltiplas Strings</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1c2128">
    <link rel="apple-touch-icon" href="/logo.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="/ui.js"></script>
</head>
<body>
    <div class="topbar no-print">
        <a href="/" class="voltar">⬅ Menu</a>
        <span class="titulo">🔌 Ensaios Inversor (Strings CC)</span>
        <span class="spacer"></span>
    </div>

    <div class="container" style="max-width: 600px; padding: 0;">
        <form id="formCC">
            <div class="card-instrumento">
                <span class="label-tech">Identificação do Equipamento</span>
                <div class="row g-2 mb-2">
                    <div class="col"><input type="text" id="usina" class="form-control form-control-sm" placeholder="Usina" required></div>
                    <div class="col"><input type="text" id="skid" class="form-control form-control-sm dado" placeholder="SKID" required></div>
                </div>
                <div class="row g-2 align-items-center mb-2">
                    <div class="col-8"><input type="text" id="inversor" class="form-control form-control-sm dado" placeholder="Inversor" required></div>
                    <div class="col-4">
                        <input type="number" id="qtd_strings" class="form-control form-control-sm dado" placeholder="Qtd Strings (1-30)" min="1" max="30" required oninput="gerarCampos()">
                    </div>
                </div>
                <span class="label-tech">Módulo / Condição de Ensaio</span>
                <div class="row g-2 mb-1">
                    <div class="col-3"><input type="number" id="n_modulos" class="form-control form-control-sm dado text-center" placeholder="Nº Mód." min="1" required></div>
                    <div class="col-3"><input type="number" step="0.01" id="voc_stc" class="form-control form-control-sm dado text-center" placeholder="VOC STC (V)" required></div>
                    <div class="col-3"><input type="number" step="0.001" id="beta_voc" class="form-control form-control-sm dado text-center" placeholder="β VOC (%/°C)" required></div>
                    <div class="col-3"><input type="number" step="0.1" id="t_medida" class="form-control form-control-sm dado text-center" placeholder="Temp (°C)" required></div>
                </div>
                <div class="text-muted" style="font-size:0.68rem;">Dados de placa do módulo — mesmos valores para todas as strings deste inversor.</div>
            </div>

            <div id="dynamic_strings" class="mb-3"></div>

            <button type="submit" id="btn_salvar" class="btn btn-instrumento no-print d-none">GERAR LAUDO E SALVAR LOTE</button>
        </form>

        <div id="box_laudo" class="mt-4 p-3 card-instrumento d-none">
            <h6 class="text-center fw-bold border-bottom pb-2 mb-3">LAUDO - STRINGS CC</h6>
            <div id="laudo_render"></div>
            <button onclick="gerarPDF()" class="btn btn-instrumento-outline mt-4 no-print">📥 DESCARREGAR PDF</button>
        </div>
    </div>

    <script>
        // Mesmos limites do backend (models.py) — mantidos em espelho para a pré-visualização em tela
        const LIMITE_TOQUE = 120;     // NBR 17193 — não alterar sem revisão normativa
        const TOL_VOC = 0.05;         // 5%
        const TOL_CONSISTENCIA = 0.08; // 8% — provisório, recalibrar com mais amostras

        function gerarCampos() {
            let qtd = parseInt(document.getElementById('qtd_strings').value);
            let container = document.getElementById('dynamic_strings');
            let btn = document.getElementById('btn_salvar');
            container.innerHTML = '';
            
            if(qtd > 0 && qtd <= 30) {
                btn.classList.remove('d-none');
                for(let i = 1; i <= qtd; i++) {
                    container.innerHTML += `
                        <div class="subcard">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <span class="fw-bold text-muted small">String ${i}</span>
                                <input type="text" id="tag_${i}" class="form-control form-control-sm w-75 dado" placeholder="TAG (Ex: STR-0${i})" required>
                            </div>
                            <div class="row g-1">
                                <div class="col-4"><input type="number" step="0.1" id="voc_${i}" class="form-control form-control-sm dado text-center" placeholder="VOC" required></div>
                                <div class="col-4"><input type="number" step="0.1" id="v_pos_${i}" class="form-control form-control-sm dado text-center" placeholder="Pos/T" required></div>
                                <div class="col-4"><input type="number" step="0.1" id="v_neg_${i}" class="form-control form-control-sm dado text-center" placeholder="Neg/T" required></div>
                            </div>
                        </div>
                    `;
                }
            } else {
                btn.classList.add('d-none');
            }
        }

        async function salvarLoteHibrido(payloads) {
            let salvosOnline = 0; let salvosOffline = 0;
            let fila = JSON.parse(localStorage.getItem('sync_queue') || '[]');

            if(navigator.onLine) {
                for(let p of payloads) {
                    try {
                        let r = await fetch('/api/sync/cabos-cc', {method: 'POST', body: JSON.stringify(p), headers: {'Content-Type': 'application/json'}});
                        if(r.ok) salvosOnline++; else { fila.push({url: '/api/sync/cabos-cc', data: p}); salvosOffline++; }
                    } catch(e) { fila.push({url: '/api/sync/cabos-cc', data: p}); salvosOffline++; }
                }
            } else {
                for(let p of payloads) { fila.push({url: '/api/sync/cabos-cc', data: p}); salvosOffline++; }
            }

            if(salvosOffline > 0) localStorage.setItem('sync_queue', JSON.stringify(fila));
            
            if(salvosOnline > 0 && salvosOffline === 0) mostrarToast(`✅ Lote salvo (${salvosOnline} strings na nuvem)`, 'ok');
            else mostrarToast(`⚠️ Salvo offline (${salvosOffline} pendentes)`, 'offline');
        }

        document.getElementById('formCC').onsubmit = async (e) => {
            e.preventDefault();
            const usina = document.getElementById('usina').value;
            const skid = document.getElementById('skid').value;
            const inversor = document.getElementById('inversor').value;
            const qtd = parseInt(document.getElementById('qtd_strings').value);

            const nModulos = parseInt(document.getElementById('n_modulos').value);
            const vocStc = parseFloat(document.getElementById('voc_stc').value);
            const betaVoc = parseFloat(document.getElementById('beta_voc').value);
            const tMedida = parseFloat(document.getElementById('t_medida').value);
            const vocEsperada = nModulos * vocStc * (1 + (betaVoc / 100) * (tMedida - 25));

            let payloads = [];
            let htmlTabela = "";
            let alertas = "";
            let erroGeral = false;

            for(let i = 1; i <= qtd; i++) {
                let tag = document.getElementById(`tag_${i}`).value;
                let voc = parseFloat(document.getElementById(`voc_${i}`).value);
                let vp = parseFloat(document.getElementById(`v_pos_${i}`).value);
                let vn = parseFloat(document.getElementById(`v_neg_${i}`).value);

                payloads.push({
                    usina, skid, inversor, tag, origem: "Campo", destino: "Campo",
                    voc, v_pos_terra: vp, v_neg_terra: vn,
                    n_modulos: nModulos, voc_stc: vocStc, beta_voc: betaVoc, t_medida: tMedida
                });

                // Critério B — tensão de toque (NBR 17193)
                let st_p = vp >= LIMITE_TOQUE ? 'FALHA' : 'OK';
                let st_n = vn >= LIMITE_TOQUE ? 'FALHA' : 'OK';

                // Critério C — consistência do divisor flutuante: (Vpos+Vneg)/VOC deve ser pequeno
                const razaoConsist = voc > 0 ? (vp + vn) / voc : 0;
                let st_consist = razaoConsist > TOL_CONSISTENCIA ? 'FALHA' : 'OK';

                // Critério A — VOC medida vs. esperada (datasheet + temperatura)
                const desvioVoc = vocEsperada > 0 ? Math.abs(voc - vocEsperada) / vocEsperada : 0;
                let st_voc = desvioVoc > TOL_VOC ? 'FALHA' : 'OK';

                const falhouString = st_p === 'FALHA' || st_n === 'FALHA' || st_consist === 'FALHA' || st_voc === 'FALHA';
                if(falhouString) erroGeral = true;

                if(st_p === 'FALHA') alertas += `<div class="alerta-fuga"><b>${tag}:</b> Falha Pos/Terra (${vp.toFixed(1)}V ≥ ${LIMITE_TOQUE}V). Verificar cabo <b>NEGATIVO</b>.</div>`;
                if(st_n === 'FALHA') alertas += `<div class="alerta-fuga"><b>${tag}:</b> Falha Neg/Terra (${vn.toFixed(1)}V ≥ ${LIMITE_TOQUE}V). Verificar cabo <b>POSITIVO</b>.</div>`;
                if(st_consist === 'FALHA') alertas += `<div class="alerta-fuga"><b>${tag}:</b> Fuga simétrica — (Vpos+Vneg)/VOC = ${(razaoConsist*100).toFixed(1)}% (limite ${(TOL_CONSISTENCIA*100).toFixed(0)}%). Isolamento degradado nos dois polos.</div>`;
                if(st_voc === 'FALHA') alertas += `<div class="alerta-fuga"><b>${tag}:</b> VOC fora do esperado — medida ${voc.toFixed(1)}V, esperada ${vocEsperada.toFixed(1)}V (desvio ${(desvioVoc*100).toFixed(1)}%). Verificar módulo em curto/bypass ou contagem de módulos.</div>`;

                htmlTabela += `
                    <tr>
                        <td class="fw-bold">${tag}</td>
                        <td class="valor-mono ${st_voc==='FALHA'?'text-danger fw-bold':''}">${voc}</td>
                        <td class="valor-mono ${st_p==='FALHA'?'text-danger fw-bold':'text-success'}">${vp}</td>
                        <td class="valor-mono ${st_n==='FALHA'?'text-danger fw-bold':'text-success'}">${vn}</td>
                        <td><span class="status-badge ${falhouString?'bg-fail':'bg-ok'}">${falhouString?'FALHA':'OK'}</span></td>
                    </tr>
                `;
            }

            await salvarLoteHibrido(payloads);

            const seloClasse = erroGeral ? 'selo-refazer' : 'selo-conforme';
            const seloTexto = erroGeral ? '✗ VERIFICAR STRINGS' : '✓ CONFORME';

            document.getElementById('laudo_render').innerHTML = `
                <div class="selo-veredito ${seloClasse}">${seloTexto}</div>
                <div class="header-laudo text-center">
                    <div class="row mb-1"><div class="col-6"><b>Usina:</b> ${usina}</div><div class="col-6"><b>SKID:</b> ${skid}</div></div>
                    <div class="row"><div class="col-12"><b>Inversor:</b> ${inversor} <br><span class="text-muted small">(${qtd} Strings Analisadas)</span></div></div>
                    <div class="row mt-1"><div class="col-12 text-muted" style="font-size:0.7rem;">VOC esperada (ref.): ${vocEsperada.toFixed(1)} V — ${nModulos} módulos, ${tMedida}°C, β=${betaVoc}%/°C</div></div>
                </div>
                
                <table class="table-laudo mb-2">
                    <tr class="bg-light"><th>TAG</th><th>VOC</th><th>Pos/T</th><th>Neg/T</th><th>Status</th></tr>
                    ${htmlTabela}
                </table>
                ${alertas}
            `;
            document.getElementById('box_laudo').classList.remove('d-none');
            document.getElementById('box_laudo').scrollIntoView({ behavior: 'smooth' });
        };

        function gerarPDF() { 
            const elemento = document.getElementById('box_laudo');
            const tag = document.getElementById('tag') ? document.getElementById('tag').value : 'Equipamento';
            const nomeArquivo = `Laudo_${tag || 'StringsCC'}.pdf`;
            
            const opt = { 
                margin: 10, 
                filename: nomeArquivo, 
                image: { type: 'jpeg', quality: 0.98 }, 
                html2canvas: { scale: 2, scrollY: 0 }, 
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } 
            };

            const btn = document.querySelector('button[onclick="gerarPDF()"]');
            const textoOriginal = btn.innerHTML;
            btn.innerHTML = '⏳ GERANDO PDF...';

            const isApple = navigator.userAgent.match(/iphone|ipad|ipod/i);

            if (isApple && navigator.canShare) {
                html2pdf().set(opt).from(elemento).output('blob').then(function(pdfBlob) {
                    btn.innerHTML = textoOriginal;
                    const file = new File([pdfBlob], nomeArquivo, { type: 'application/pdf' });
                    navigator.share({
                        title: 'Laudo Técnico',
                        files: [file]
                    }).catch(e => console.log('Partilha cancelada'));
                });
            } else {
                html2pdf().set(opt).from(elemento).save().then(() => {
                    btn.innerHTML = textoOriginal;
                });
            }
        }
    </script>
</body>

</html>
