<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Conversor de Resistência</title>

    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1c2128">
    <link rel="apple-touch-icon" href="/logo.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <script src="/resistencia.js"></script>
    <script src="/ui.js"></script>
</head>
<body>
    <div class="topbar no-print">
        <a href="/" class="voltar">⬅ Menu</a>
        <span class="titulo">🧮 Conversor de Resistência</span>
        <span class="spacer"></span>
    </div>

    <div class="container" style="max-width: 600px; padding: 0;">
        <div class="card-instrumento">
            <span class="label-tech">Valor a converter</span>
            <div class="row g-2">
                <div class="col-7">
                    <input type="number" step="any" id="valorEntrada" class="form-control dado" placeholder="Digite um valor" inputmode="decimal">
                </div>
                <div class="col-5">
                    <select id="unidadeEntrada" class="form-select fw-bold">
                        <option value="µΩ">µΩ (microOhm)</option>
                        <option value="mΩ">mΩ (miliOhm)</option>
                        <option value="Ω" selected>Ω (Ohm)</option>
                        <option value="kΩ">kΩ (kiloOhm)</option>
                        <option value="MΩ">MΩ (megaOhm)</option>
                        <option value="GΩ">GΩ (gigaOhm)</option>
                        <option value="TΩ">TΩ (teraOhm)</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="card-instrumento">
            <span class="label-tech">Resultado em todas as unidades</span>
            <div id="resultados"></div>
        </div>

        <div class="norma-tech">
            💡 Referência rápida usada nos ensaios deste portal: Resistência de Contato é medida em <b>µΩ/mΩ</b>, Resistência de Isolamento em <b>MΩ</b> (ou <b>TΩ</b> em megôhmetros de faixa estendida), e Resistência de Malha/Aterramento em <b>Ω</b>.
        </div>
    </div>

    <script>
        const UNIDADES = ['µΩ', 'mΩ', 'Ω', 'kΩ', 'MΩ', 'GΩ', 'TΩ'];

        /**
         * Formata o valor convertido com ~4 algarismos significativos.
         * Unidades muito distantes entre si (ex: µΩ → TΩ, 18 ordens de
         * grandeza) geram números longos demais ou "0,000000" com casas
         * decimais fixas — aqui troca para notação científica nesses casos.
         */
        function formatarValor(valor) {
            if (valor === 0) return '0';
            const abs = Math.abs(valor);

            if (abs < 1e-4 || abs >= 1e7) {
                const [mantissa, expoente] = valor.toExponential(3).split('e');
                return `${mantissa}×10<sup>${expoente.replace('+', '')}</sup>`;
            }

            const ordem = Math.floor(Math.log10(abs));
            const casas = Math.max(0, 3 - ordem);
            return parseFloat(valor.toFixed(casas)).toString();
        }

        function renderizar() {
            const valorStr = document.getElementById('valorEntrada').value;
            const unidadeOrigem = document.getElementById('unidadeEntrada').value;
            const container = document.getElementById('resultados');
            container.innerHTML = '';

            if (valorStr === '' || isNaN(valorStr)) {
                container.innerHTML = '<p class="text-muted small text-center mb-0">Digite um valor para ver as conversões.</p>';
                return;
            }

            if (parseFloat(valorStr) < 0) {
                container.innerHTML = '<p class="small text-center mb-2" style="color:var(--ambar);">⚠ Resistência não deve ser negativa — verifique a leitura.</p>';
            }

            UNIDADES.forEach(unidade => {
                const valorConvertido = converterResistencia(valorStr, unidadeOrigem, unidade);
                const ehOrigem = unidade === unidadeOrigem;
                const valorFormatado = formatarValor(valorConvertido);

                container.innerHTML += `
                    <div class="subcard d-flex justify-content-between align-items-center valor-copiavel" style="${ehOrigem ? 'border-width:1.5px;background:var(--ambar-suave);' : ''}" data-valor="${valorConvertido}" data-unidade="${unidade}" role="button">
                        <span class="fw-bold text-muted" style="font-size:0.85rem;">${unidade}${ehOrigem ? ' <span class="badge" style="background:var(--ambar);font-size:0.6rem;">origem</span>' : ''}</span>
                        <span class="valor-mono" style="font-size:1rem;color:${ehOrigem ? 'var(--texto)' : 'var(--ambar)'}">${valorFormatado}</span>
                    </div>
                `;
            });
        }

        // Toca em qualquer linha de resultado para copiar o valor cheio (sem notação científica)
        document.getElementById('resultados').addEventListener('click', (e) => {
            const linha = e.target.closest('.valor-copiavel');
            if (!linha) return;
            const valor = linha.dataset.valor;
            const unidade = linha.dataset.unidade;
            navigator.clipboard.writeText(valor).then(() => {
                mostrarToast(`${unidade} copiado: ${valor}`, 'ok');
            }).catch(() => {
                mostrarToast('Não foi possível copiar', 'erro');
            });
        });

        document.getElementById('valorEntrada').addEventListener('input', renderizar);
        document.getElementById('unidadeEntrada').addEventListener('change', renderizar);
        renderizar();
    </script>
</body>
</html>
