<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Continuidade de Malha - Portal de Engenharia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { background: #f4f7f6; font-size: 0.85rem; padding: 10px; }
        .group-box { background: white; border-radius: 12px; padding: 18px; margin-bottom: 12px; border: 1px solid #dee2e6; }
        .label-eng { font-weight: bold; color: #0d6efd; font-size: 0.75rem; display: block; margin-bottom: 8px; text-transform: uppercase; }
        .norma { background: #e3f2fd; color: #055160; padding: 5px; border-radius: 4px; font-size: 0.7rem; font-style: italic; margin-bottom: 10px; border-left: 3px solid #0d6efd; display: block; }
        .status-badge { padding: 4px 10px; border-radius: 4px; font-weight: bold; font-size: 0.7rem; }
        .bg-ok { background: #d1e7dd; color: #0f5132; }
        .bg-fail { background: #f8d7da; color: #842029; }
        .bg-warn { background: #e2e3e5; color: #41464b; }
        .table-laudo { width: 100%; margin-top: 5px; border-collapse: collapse; }
        .table-laudo th, .table-laudo td { border: 1px solid #eee; padding: 6px; text-align: center; }
        .header-laudo { background: #f8f9fa; font-weight: bold; color: #333; padding: 10px; border-radius: 5px; margin-bottom: 10px; border: 1px solid #ddd; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>
    <div class="container" style="max-width: 550px;">
        <a href="/" class="btn btn-sm btn-outline-secondary mb-3 no-print">⬅️ Voltar ao Menu</a>
        <h5 class="text-center text-secondary mb-3">🔗 Continuidade de Malha</h5>
        
        <form id="formEnsaios">
            <div class="group-box shadow-sm">
                <span class="label-eng">Identificação do Setor</span>
                <div class="row g-2 mb-2">
                    <div class="col"><input type="text" id="usina" class="form-control" placeholder="Usina" required></div>
                    <div class="col"><input type="text" id="tag" class="form-control" placeholder="Área/Setor (Ex: Inversor 1)" required></div>
                </div>
            </div>

            <div class="group-box shadow-sm">
                <span class="label-eng">Pontos de Medição (Equipamento ➔ Malha)</span>
                <span class="norma">Critério Normativo: <= 1000 mΩ (1 Ω)</span>
                
                <div class="row g-2 mb-3 align-items-center">
                    <div class="col-8"><input type="text" id="pt1_nome" class="form-control" placeholder="Ponto 1 (Ex: Carcaça)"></div>
                    <div class="col-4"><input type="text" inputmode="decimal" id="pt1_res" class="form-control border-primary" placeholder="Ex: 15,5 mΩ"></div>
                </div>
                
                <div class="row g-2 mb-3 align-items-center">
                    <div class="col-8"><input type="text" id="pt2_nome" class="form-control" placeholder="Ponto 2 (Ex: Porta do Painel)"></div>
                    <div class="col-4"><input type="text" inputmode="decimal" id="pt2_res" class="form-control border-primary" placeholder="Ex: 22,3 mΩ"></div>
                </div>

                <div class="row g-2 align-items-center">
                    <div class="col-8"><input type="text" id="pt3_nome" class="form-control" placeholder="Ponto 3 (Ex: Estrutura)"></div>
                    <div class="col-4"><input type="text" inputmode="decimal" id="pt3_res" class="form-control border-primary" placeholder="Ex: 8,1 mΩ"></div>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-3 fw-bold shadow no-print">GERAR LAUDO DE CONTINUIDADE</button>
        </form>

        <div id="box_laudo" class="mt-4 p-4 bg-white border rounded d-none shadow">
            <h6 class="text-center fw-bold border-bottom pb-2 mb-3">LAUDO - CONTINUIDADE DE MALHA</h6>
            <div id="laudo_header" class="header-laudo"></div>
            <div id="laudo_body"></div>
            <button onclick="gerarPDF()" class="btn btn-danger w-100 mt-4 fw-bold no-print">📥 DESCARREGAR PDF</button>
        </div>
    </div>

    <script>
        // Esta função substitui a vírgula por ponto para que o Python entenda os decimais perfeitamente
        const parseF = (id) => { 
            let v = document.getElementById(id).value.replace(',', '.'); 
            return v === "" ? 0 : parseFloat(v); 
        };
        
        function badgeClass(status) { return status === 'CONFORME' ? 'bg-ok' : (status === 'NÃO AVALIADO' ? 'bg-warn' : 'bg-fail'); }

        document.getElementById('formEnsaios').onsubmit = async (e) => {
            e.preventDefault();
            const payload = {
                usina: document.getElementById('usina').value, tag: document.getElementById('tag').value,
                pt1_nome: document.getElementById('pt1_nome').value, pt1_res: parseF('pt1_res'),
                pt2_nome: document.getElementById('pt2_nome').value, pt2_res: parseF('pt2_res'),
                pt3_nome: document.getElementById('pt3_nome').value, pt3_res: parseF('pt3_res')
            };

            try {
                const response = await fetch('/ensaio/cont-malha/validar', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                const d = await response.json();
                
                const box = document.getElementById('box_laudo');
                box.classList.remove('d-none');
                
                document.getElementById('laudo_header').innerHTML = `<div class="row text-center"><div class="col-6"><b>Área/Setor:</b> ${payload.tag}</div><div class="col-6"><b>Usina:</b> ${payload.usina}</div></div>`;

                let linhasTabela = "";
                // Como devolvemos o valor com parseF (que usa ponto), podemos formatar com vírgula para ficar bonito no PDF:
                const formataBR = (num) => num.toString().replace('.', ',');

                if(payload.pt1_nome) linhasTabela += `<tr><td>${payload.pt1_nome}</td><td>${formataBR(payload.pt1_res)} mΩ</td><td><span class="status-badge ${badgeClass(d.p1)}">${d.p1}</span></td></tr>`;
                if(payload.pt2_nome) linhasTabela += `<tr><td>${payload.pt2_nome}</td><td>${formataBR(payload.pt2_res)} mΩ</td><td><span class="status-badge ${badgeClass(d.p2)}">${d.p2}</span></td></tr>`;
                if(payload.pt3_nome) linhasTabela += `<tr><td>${payload.pt3_nome}</td><td>${formataBR(payload.pt3_res)} mΩ</td><td><span class="status-badge ${badgeClass(d.p3)}">${d.p3}</span></td></tr>`;

                if(linhasTabela === "") linhasTabela = `<tr><td colspan="3" class="text-muted">Nenhum ponto registrado.</td></tr>`;

                document.getElementById('laudo_body').innerHTML = `
                    <div class="mb-3">
                        <span class="label-eng">Resultados das Conexões Equipotenciais</span>
                        <table class="table-laudo">
                            <tr><th>Ponto Testado</th><th>Resistência (mΩ)</th><th>Status</th></tr>
                            ${linhasTabela}
                        </table>
                    </div>
                    <div class="text-end mt-2">
                        Status Geral: <span class="status-badge ${badgeClass(d.status_geral)}">${d.status_geral}</span>
                    </div>
                `;
                box.scrollIntoView({ behavior: 'smooth' });
            } catch (error) { alert("Erro ao validar. Verifique o servidor."); }
        };

        function gerarPDF() {
            const elemento = document.getElementById('box_laudo');
            document.querySelector('.no-print.btn-danger').style.display = 'none';
            html2pdf().set({ margin: 15, filename: `Laudo_ContMalha_${document.getElementById('tag').value}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2, scrollY: 0, useCORS: true }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } }).from(elemento).save().then(() => { document.querySelector('.no-print.btn-danger').style.display = 'block'; });
        }
    </script>
</body>
</html>
